<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akshara Alchemist - Ultimate Pro</title>
    <style>
        :root { --bg: #0f172a; --blue: #38bdf8; --gold: #fbbf24; --white: #f1f5f9; --green: #4ade80; --red: #ef4444; }
        * { box-sizing: border-box; touch-action: none; -webkit-user-select: none; } 
        
        body { 
            height: 100vh; margin: 0; overflow: hidden; background: var(--bg); color: var(--white);
            font-family: sans-serif; display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 420px; height: 100%; display: flex; flex-direction: column; padding: 10px; }
        header { text-align: center; height: 14%; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; justify-content: center;}
        
        .dashboard { display: flex; justify-content: space-around; align-items: center; margin-bottom: 5px; }
        .timer { font-family: monospace; font-size: 1.2rem; color: var(--gold); font-weight: bold; }
        .score-box { background: rgba(56, 189, 248, 0.1); border: 1px solid var(--blue); padding: 4px 12px; border-radius: 20px; font-weight: bold; color: var(--green); font-size: 0.9rem; }
        
        .settings-bar { display: flex; gap: 8px; justify-content: center; }
        .settings-bar select { background:#1e293b; color:white; border:1px solid var(--blue); padding: 4px 6px; font-size: 0.75rem; border-radius: 4px; outline: none; }

        #goal-area { text-align: center; height: 12%; display: flex; align-items: center; justify-content: center; }
        #target-text { color: var(--gold); font-size: 2.2rem; font-weight: bold; border-bottom: 3px solid #334155; }

        .game-grid { display: grid; grid-template-columns: 80px 1fr 80px; gap: 10px; height: 48%; align-items: center; }
        .bank { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--blue); border-radius: 12px;
            height: 95%; display: flex; flex-direction: column; align-items: center; padding: 5px; gap: 8px; overflow-y: auto;
        }
        .bank h3 { font-size: 0.6rem; margin: 2px; color: var(--blue); text-align: center;}

        .forge-zone { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #forge-circle {
            width: 110px; height: 110px; border: 4px dashed var(--gold); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 3rem;
            background: rgba(251,191,36,0.05); transition: all 0.2s;
        }

        .shake { animation: shake 0.4s; border-color: var(--red) !important; background: rgba(239, 68, 68, 0.2) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        .tile {
            width: 60px; height: 60px; background: white; color: #1e293b; border-radius: 10px;
            display: flex; justify-content: center; align-items: center; font-size: 1.8rem; font-weight: bold;
            box-shadow: 0 4px 0 #94a3b8; flex-shrink: 0; cursor: grab;
        }
        .tile:active { cursor: grabbing; }
        .tile.m { background: var(--gold); box-shadow: 0 4px 0 #b45309; }

        #msg { font-size: 0.8rem; color: var(--green); margin-top: 10px; height: 15px; font-weight: bold; text-align: center; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 5px; }
        .action-btn { padding: 8px 12px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        #skip-btn { background: #334155; color: white; }
        #back-btn { background: #475569; color: white; }
        #next-btn { background: var(--green); color: #0f172a; }
        .hidden { display: none !important; }
        
        #tray-area { height: 15%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .word-tray { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .slot { width: 55px; height: 55px; border: 2px dashed #475569; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 1.4rem; background: rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="dashboard">
            <div class="timer">⏱️ <span id="clock">00:00</span></div>
            <div class="score-box">⭐ SCORE: <span id="pts-scored">0</span> / <span id="pts-total">0</span></div>
        </div>
        <div class="settings-bar">
            <select id="lvl" onchange="start()">
                <option value="1">Lvl 1: Syllables</option>
                <option value="2">Lvl 2: Words</option>
            </select>
            <select id="round-count" onchange="start()">
                <option value="10">10 Words</option>
                <option value="20">20 Words</option>
                <option value="30">30 Words</option>
                <option value="50">50 Words</option>
                <option value="all">All Words!</option>
            </select>
        </div>
    </header>

    <div id="goal-area"><div id="target-text">...</div></div>

    <div class="game-grid">
        <div class="bank" id="v-bank"></div>
        <div class="forge-zone">
            <div id="forge-circle" ondragover="allowDrop(event)" ondrop="handleDrop(event)" draggable="true" ondragstart="handleForgeDrag(event)">?</div>
            <div id="msg">Drag a Vyanjan</div>
            
            <div class="btn-group">
                <button id="back-btn" class="action-btn hidden" onclick="moveBack()">⬅</button>
                <button id="skip-btn" class="action-btn" onclick="skipChallenge()">Skip ➡</button>
                <button id="next-btn" class="action-btn hidden" onclick="moveNext()">Next ➡</button>
            </div>
        </div>
        <div class="bank" id="m-bank"></div>
    </div>

    <div id="tray-area" class="hidden"><div class="word-tray" id="word-tray"></div></div>
</div>

        let arr = [...array];

        {w:"दो", p:["दो"], v:["द","म","ल"], m:["ो","ौ"]}, {w:"तीन", p:["ती","न"], v:["त","न","ल"], m:["ी","ि"]},
        {w:"चार", p:["चा","र"], v:["च","र","ल"], m:["ा","े"]}, {w:"छह", p:["छ","ह"], v:["छ","ह","म"], m:["ा","े"]},
        {w:"सात", p:["सा","त"], v:["स","त","ल"], m:["ा","े"]}, {w:"आठ", p:["आ","ठ"], v:["आ","ठ","ल"], m:["ा","ी"]},
        {w:"नौ", p:["नौ"], v:["न","म","ल"], m:["ौ","ो"]}, {w:"दस", p:["द","स"], v:["द","स","ल"], m:["ा","े"]},
        {w:"सफेद", p:["स","फे","द"], v:["स","फ","द","र"], m:["े","ै"]}, {w:"लाल", p:["ला","ल"], v:["ल","र","म"], m:["ा","े"]},
        {w:"केसरिया", p:["के","स","रि","या"], v:["क","स","र","य"], m:["े","ि"]}, {w:"नीला", p:["नी","ला"], v:["न","ल","म"], m:["ी","ा"]},
        {w:"काला", p:["का","ला"], v:["क","ल","म"], m:["ा","ी"]}, {w:"पीला", p:["पी","ला"], v:["प","ल","म"], m:["ी","ा"]},
        {w:"हरा", p:["ह","रा"], v:["ह","र","ल"], m:["ा","ी"]}, {w:"गुलाबी", p:["गु","ला","बी"], v:["ग","ल","ब","च"], m:["ु","ा"]},
        {w:"बाघ", p:["बा","घ"], v:["ब","घ","ल"], m:["ा","े"]}, {w:"हाथी", p:["हा","थी"], v:["ह","थ","म"], m:["ा","ी"]},
        {w:"खरगोश", p:["ख","र","गो","श"], v:["ख","र","ग","श"], m:["ो","ौ"]}, {w:"गधा", p:["ग","धा"], v:["ग","ध","ल"], m:["ा","े"]},
        {w:"कौआ", p:["कौ","आ"], v:["क","आ","म"], m:["ौ","ो"]}, {w:"कबूतर", p:["क","बू","त","र"], v:["क","ब","त","र"], m:["ू","ु"]},
        {w:"तोता", p:["तो","ता"], v:["त","म","ल"], m:["ो","ा"]}, {w:"गौरैया", p:["गौ","रै","या"], v:["ग","र","य","ल"], m:["ौ","ै"]},
        {w:"चील", p:["ची","ल"], v:["च","ल","म"], m:["ी","ि"]}, {w:"आलू", p:["आ","लू"], v:["आ","ल","प"], m:["ू","ु"]},
        {w:"टमाटर", p:["ट","मा","ट","र"], v:["ट","म","र","क"], m:["ा","े"]}, {w:"तुरई", p:["तु","र","ई"], v:["त","र","ई","ल"], m:["ु","ू"]},
        {w:"मटर", p:["म","ट","र"], v:["म","ट","र","क"], m:["ा","े"]}, {w:"लौकी", p:["लौ","की"], v:["ल","क","म"], m:["ौ","ी"]},
        {w:"अदरक", p:["अ","द","र","क"], v:["अ","द","र","क","म"], m:["ा","े"]}, {w:"सेम", p:["से","म"], v:["स","म","ल"], m:["े","ै"]},
        {w:"ककड़ी", p:["क","क","ड़ी"], v:["क","ड़","ल"], m:["ी","ि"]}, {w:"करेला", p:["क","रे","ला"], v:["क","र","ल","म"], m:["े","ा"]},
        {w:"सहजन", p:["स","ह","ज","न"], v:["स","ह","ज","न","ल"], m:["ा","े"]}, {w:"गाजर", p:["गा","ज","र"], v:["ग","ज","र","ल"], m:["ा","े"]},
        {w:"पालक", p:["पा","ल","क"], v:["प","ल","क","म"], m:["ा","े"]}, {w:"लहसुन", p:["ल","ह","सु","न"], v:["ल","ह","स","न"], m:["ु","ू"]},
        {w:"कुम्हड़ा", p:["कु","म्ह","ड़ा"], v:["क","म्ह","ड़","ल"], m:["ु","ा"]}, {w:"गुलाब", p:["गु","ला","ब"], v:["ग","ल","ब","च"], m:["ु","ा"]},
        {w:"केवड़ा", p:["के","व","ड़ा"], v:["क","व","ड़","ल"], m:["े","ा"]}, {w:"चमेली", p:["च","मे","ली"], v:["च","म","ल","न"], m:["े","ी"]},
        {w:"जूही", p:["जू","ही"], v:["ज","ह","ल"], m:["ू","ी"]}, {w:"गुड़हल", p:["गु","ड़","ह","ल"], v:["ग","ड़","ह","ल"], m:["ु","ू"]},
        {w:"पारिजात", p:["पा","रि","जा","त"], v:["प","र","ज","त"], m:["ा","ि"]},
        {w:"प्याज", p:["प्या","ज"], v:["प्य","ज","ल"], m:["ा","े"]}, {w:"मिर्च", p:["मि","र्च"], v:["म","र्च","ल"], m:["ि","ी"]},
        
        // COMPLEX BINDU WORDS (These will be pushed to the final rounds)
        {w:"अंगूठी", p:["अं","गू","ठी"], v:["अ","ग","ठ","ल"], m:["ं","ू","ी","ा"]}, {w:"चूड़ियाँ", p:["चू","ड़ि","याँ"], v:["च","ड़","य","क"], m:["ू","ि","ा","ँ"]},
        {w:"पाँच", p:["पाँ","च"], v:["प","च","ल"], m:["ा","ँ","े"]}, {w:"बैंगनी", p:["बैं","ग","नी"], v:["ब","ग","न","म"], m:["ै","ं","ी","ा"]},
        {w:"भैंस", p:["भैं","स"], v:["भ","स","ल"], m:["ै","ं","े"]}, {w:"कुंदरू", p:["कुं","द","रू"], v:["क","द","र","ल"], m:["ु","ं","ू","ा"]},
        {w:"चिचिंडा", p:["चि","चिं","डा"], v:["च","ड","ल"], m:["ि","ं","ा","े"]}, {w:"शकरकंद", p:["श","क","र","कं","द"], v:["श","क","र","द","ल"], m:["ं","ा"]},
        {w:"फूल गोभी", p:["फू","ल","गो","भी"], v:["फ","ल","ग","भ"], m:["ू","ो","ी"]}, {w:"बंद गोभी", p:["बं","द","गो","भी"], v:["ब","द","ग","भ"], m:["ं","ो","ी"]},
        {w:"चंपा", p:["चं","पा"], v:["च","प","ल"], m:["ं","ा","े"]}, {w:"गेंदा", p:["गें","दा"], v:["ग","द","ल"], m:["े","ं","ा"]}
    ];

    // Helper function to check if a word requires a Bindu/Chandrabindu
    const isComplex = (item) => item.m && item.m.some(matra => BINDUS.includes(matra));

    function start() {
        idx = 0; currentScore = 0; 
        solvedIndices.clear(); // Reset solved tracker
        
        const lvl = document.getElementById('lvl').value;
        const roundSetting = document.getElementById('round-count').value;
        pointsPerWord = (lvl == "1") ? 1 : 2;
        let activeData = (lvl == "1") ? l1Data : l2Data;
        
        // SMART SORTING: Separate normal words from Bindu words
        let regularWords = shuffle(activeData.filter(d => !isComplex(d)));
        let binduWords = shuffle(activeData.filter(d => isComplex(d)));
        
        if(roundSetting === "all") {
            // Append all Bindu words to the very end of the session
            currentList = [...regularWords, ...binduWords];
        } else {
            let limit = parseInt(roundSetting);
            // Dedicate the last 20% of ANY session to the "Boss Fight" Bindu words
            let complexLimit = Math.min(Math.ceil(limit * 0.2), binduWords.length);
            let regularLimit = limit - complexLimit;
            
            currentList = [...regularWords.slice(0, regularLimit), ...binduWords.slice(0, complexLimit)];
        }
        
        maxPoints = currentList.length * pointsPerWord;
        document.getElementById('pts-scored').innerText = currentScore;
        document.getElementById('pts-total').innerText = maxPoints;

        if(clockInterval) clearInterval(clockInterval);
        timer = 0; 
        clockInterval = setInterval(() => {
            timer++; let m = Math.floor(timer/60).toString().padStart(2,'0');
            let s = (timer%60).toString().padStart(2,'0');
            document.getElementById('clock').innerText = `${m}:${s}`;
        }, 1000);
        load();
    }

    function load() {
        const lvl = document.getElementById('lvl').value;
        const d = currentList[idx]; 
        
        document.getElementById('target-text').innerText = (lvl == "1") ? d.t : d.w;
        
        // Hide next/skip/back buttons appropriately
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('skip-btn').classList.remove('hidden');
        document.getElementById('back-btn').classList.toggle('hidden', idx === 0);
        
        document.getElementById('msg').innerText = "Drag a Vyanjan";
        bridge.v = ""; bridge.m = ""; bridge.b = "";
        document.getElementById('forge-circle').innerText = "?";
        
        const shuffledV = shuffle([...d.v]);
        const shuffledM = shuffle([...d.m]);

        document.getElementById('v-bank').innerHTML = "<h3>VYANJAN</h3>";
        shuffledV.forEach(v => document.getElementById('v-bank').innerHTML += `<div class="tile" draggable="true" ondragstart="hDS(event, '${v}','v')">${v}</div>`);
        
        document.getElementById('m-bank').innerHTML = "<h3>MATRA</h3>";
        shuffledM.forEach(m => {
            let type = BINDUS.includes(m) ? 'b' : 'm'; 
            document.getElementById('m-bank').innerHTML += `<div class="tile m" draggable="true" ondragstart="hDS(event, '${m}','${type}')">${m}</div>`;
        });
        
        const trayA = document.getElementById('tray-area');
        if(lvl == "2") {
            trayA.classList.remove('hidden'); document.getElementById('word-tray').innerHTML = "";
            d.p.forEach(part => document.getElementById('word-tray').innerHTML += `<div class="slot" ondragover="allowDrop(event)" ondrop="hTD(event, '${part}')">?</div>`);
        } else trayA.classList.add('hidden');
    }

    function allowDrop(e) { e.preventDefault(); }

    function hDS(e, val, type) { 
        e.dataTransfer.setData('text/plain', val);
        bridge.dVal = val; 
        bridge.dType = type; 
    }
    
    function handleForgeDrag(e) { 
        const forgedText = bridge.v + bridge.m + bridge.b;
        e.dataTransfer.setData('text/plain', forgedText);
        bridge.dVal = forgedText; 
        bridge.dType = "f"; 
    }

    function handleDrop(e) {
        e.preventDefault(); const c = document.getElementById('forge-circle'); c.classList.remove('shake');
        
        if (bridge.dType === 'v') { 
            bridge.v = bridge.dVal; bridge.m = ""; bridge.b = ""; 
            c.innerText = bridge.v; 
            document.getElementById('msg').innerText = "Add Matra or Bindu"; 
        } 
        else if (bridge.dType === 'm' && bridge.v !== "") {
            bridge.m = bridge.dVal; c.innerText = bridge.v + bridge.m + bridge.b;
            if (document.getElementById('lvl').value == "1" && c.innerText === currentList[idx].t) victory(); 
        }
        else if (bridge.dType === 'b' && bridge.v !== "") {
            bridge.b = bridge.dVal; c.innerText = bridge.v + bridge.m + bridge.b;
            if (document.getElementById('lvl').value == "1" && c.innerText === currentList[idx].t) victory(); 
        }
        else { triggerError(c, false); }
    }

    function hTD(e, target) {
        e.preventDefault(); 
        const droppedText = bridge.dVal; 
        
        if (droppedText === target) {
            e.target.innerText = droppedText; 
            e.target.style.background = "rgba(74, 222, 128, 0.2)"; 
            e.target.style.borderColor = "var(--green)";
            
            bridge.v = ""; bridge.m = ""; bridge.b = ""; 
            document.getElementById('forge-circle').innerText = "?";
            document.getElementById('msg').innerText = "Drag a Vyanjan";
            
            const slots = [...document.querySelectorAll('.slot')];
            if (slots.every(s => s.innerText !== "?")) victory();
        } else { 
            triggerError(e.target, true); document.getElementById('msg').innerText = "Wrong part!"; 
        }
    }

    function triggerError(el, wipe) {
        playSound('error'); el.classList.add('shake');
        setTimeout(() => {
            el.classList.remove('shake');
            if(wipe) { 
                bridge.v = ""; bridge.m = ""; bridge.b = "";
                document.getElementById('forge-circle').innerText = "?"; 
                document.getElementById('msg').innerText = "Failed!"; 
            }
        }, 400);
    }

    function victory() { 
        playSound('success'); 
        
        // SECURE SCORE SYSTEM: Only add points if this index hasn't been solved yet
        if (!solvedIndices.has(idx)) {
            currentScore += pointsPerWord; 
            solvedIndices.add(idx);
            document.getElementById('pts-scored').innerText = currentScore;
        }

        document.getElementById('msg').innerText = "Shabash!"; 
        document.getElementById('next-btn').classList.remove('hidden'); 
        document.getElementById('skip-btn').classList.add('hidden'); 
    }

    function moveBack() {
        if (idx > 0) { idx--; load(); }
    }

    function skipChallenge() {
        idx++; 
        if(idx >= currentList.length) { alert(`Session Complete! Final Score: ${currentScore}/${maxPoints}`); start(); } 
        else load();
    }

    function moveNext() { 
        idx++; 
        if(idx >= currentList.length) { alert(`Session Complete! Final Score: ${currentScore}/${maxPoints}`); start(); } 
        else load(); 
    }
    
    start();
</script>
